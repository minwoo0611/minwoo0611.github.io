    Projects:
      - name: "Collaborative Research with Oxford Robotics Institute DRS Group"
        date: 2024-present
        highlights:
          - "Implemented LiDAR place recognition using vision foundation models."
          - "Implemented forest localization using inter-tree geometric matching."

      - name: "Autonomous Navigation in Construction Sites"
        date: 2021-2025
        highlights:
          - "Implemented an autonomous navigation module for a mobile robot equipped with LiDAR, IMU, and GPS."
          - "Demonstrated the system across multiple construction sites."

      - name: "Global Re-localization for LiDAR SLAM"
        date: 2023-2024
        highlights:
          - "Developed global re-localization for scan-to-submap registration in GPS-denied environments."
          - "Integrated the module into an existing SLAM framework and validated it with real-world multi-session data."

      - name: "Multiple LiDAR-IMU SLAM"
        date: 2022-2023
        highlights:
          - "Developed a multiple LiDAR-IMU SLAM framework for trajectory estimation in unstructured environments."
          - "Integrated the module into a hardware platform and validated it in real-world forest environments."

